name: Build SILVERGOLD APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Clear old GitHub Actions cache
        run: |
          echo "Clearing old action caches..."
          rm -rf ~/.cache/actions || true
          rm -rf ~/.local/share/actions || true
          rm -rf /home/runner/.cache/actions || true
          rm -rf /home/runner/work/_actions || true
          echo "Cache cleared."

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SILVERGOLD-APK
          path: build/app/outputs/flutter-apk/app-release.apk
